// 解码hex字符串为ImageData（1字符=1像素）
decode(hex,w,h){
let cv=document.createElement('canvas');cv.width=w;cv.height=h;
let c=cv.getContext('2d');let img=c.createImageData(w,h);
for(let i=0;i<hex.length;i++){
let ch=hex[i];if(ch==='.'||ch===' '){img.data[i*4+3]=0;continue}
let col=this.palette[ch];
if(!col){img.data[i*4]=255;img.data[i*4+1]=0;img.data[i*4+2]=255;img.data[i*4+3]=255;continue}
let r=parseInt(col.substr(1,2),16),g=parseInt(col.substr(3,2),16),b=parseInt(col.substr(5,2),16);
img.data[i*4]=r;img.data[i*4+1]=g;img.data[i*4+2]=b;img.data[i*4+3]=255}
c.putImageData(img,0,0);return cv
}

// Get grass tile from cache (32x32 seamless)
getGrass32(x,y,animFrame){
if(!this.grassCache||!this.grassCache.sprites.length)return null;
var v=(x*7+y*13)%4;var f=(x*3+y*7)%120;
return this.grassCache.sprites[v]?this.grassCache.sprites[v][f]:null
}

var f=0;return this.grassCache.edgeSprites[dir][f]||null
}

class Renderer{
constructor(id){
this.cv=document.getElementById(id);this.ctx=this.cv.getContext('2d');
this.af=0;this.at=0;this.gt=480;this.ts=0.01;
this.weather='clear';this.wt=0;this.rd=[];
// 像素缓存
this.tileCache={};
// Coromon风格双层渲染系统
this.groundCv=document.createElement('canvas');
this.groundCv.width=1280;this.groundCv.height=768;
this.groundCtx=this.groundCv.getContext('2d');
this.objCv=document.createElement('canvas');
this.objCv.width=1280;this.objCv.height=768;
this.objCtx=this.objCv.getContext('2d');
this._ctxStack=[]
}
clear(){this.ctx.clearRect(0,0,this.cv.width,this.cv.height)}
clearLayers(){this.groundCtx.clearRect(0,0,1280,768);this.objCtx.clearRect(0,0,1280,768)}
pushTarget(ctx){this._ctxStack.push(this.ctx);this.ctx=ctx}
popTarget(){if(this._ctxStack.length>0)this.ctx=this._ctxStack.pop()}
isGroundTile(t){return[CFG.T.GRASS,CFG.T.WATER,CFG.T.PATH,CFG.T.TGRASS,CFG.T.FLOWER,CFG.T.MTN,CFG.T.LAVA,CFG.T.SWAMP,CFG.T.FLOOR,CFG.T.BRIDGE,CFG.T.ROCK,CFG.T.HEDGE,CFG.T.LANTERN,CFG.T.BENCH,CFG.T.STATUE_D].includes(t)}
composite(){this.ctx.drawImage(this.groundCv,0,0);this.ctx.drawImage(this.objCv,0,0)}
update(){
this.at++;if(this.at>=90){this.af=(this.af+1)%120;this.at=0}
this.gt=(this.gt+this.ts)%1440;
this.wt--;
if(this.wt<=0){let r=Math.random();this.weather=r<0.6?'clear':r<0.75?'rain':r<0.9?'snow':'fog';this.wt=18000+Math.random()*18000;
if(this.weather==='rain'){this.rd=[];for(let i=0;i<60;i++)this.rd.push({x:Math.random()*1280,y:Math.random()*768,s:3+Math.random()*3})}}
if(this.weather==='rain')for(let d of this.rd){d.y+=d.s;d.x-=0.5;if(d.y>768){d.y=0;d.x=Math.random()*1280}}
}
phase(){let h=Math.floor(this.gt/60);if(h>=6&&h<18)return'day';if(h>=18&&h<20)return'sunset';if(h>=20||h<4)return'night';return'dawn'}

// Autotile边缘过渡系统
drawAutotile(x,y,t,cx,cy,mapMgr){
let s=(x-cx)*CFG.TS,sy=(y-cy)*CFG.TS;
if(s<-CFG.TS||s>1280||sy<-CFG.TS||sy>768)return;
let c=this.ctx,TS=CFG.TS;
let up=mapMgr.getTile(x,y-1),dn=mapMgr.getTile(x,y+1);
let lt=mapMgr.getTile(x-1,y),rt=mapMgr.getTile(x+1,y);
let isW=(tt)=>tt===CFG.T.WATER||tt===CFG.T.LAVA||tt===CFG.T.SWAMP;
let isG=(tt)=>tt===CFG.T.GRASS||tt===CFG.T.TGRASS||tt===CFG.T.FLOWER;
let isP=(tt)=>tt===CFG.T.PATH||tt===CFG.T.BRIDGE;
// 草地-水面边缘：草叶悬垂效果
if(isG(t)){
if(isW(up)){for(let i=0;i<8;i++){let gx=s+i*8+1,gh=4+((x*3+i*7)%4);c.fillStyle='#5cb85c';c.fillRect(gx,sy,3,gh);c.fillStyle='#4aa04a';c.fillRect(gx+1,sy,1,gh-1)}}
if(isW(dn)){for(let i=0;i<8;i++){let gx=s+i*8+1,gh=4+((x*5+i*3)%4);c.fillStyle='#5cb85c';c.fillRect(gx,sy+TS-gh,3,gh)}}
if(isW(lt)){for(let i=0;i<8;i++){let gy=sy+i*8+1,gw=4+((y*3+i*7)%4);c.fillStyle='#5cb85c';c.fillRect(s,gy,gw,3)}}
if(isW(rt)){for(let i=0;i<8;i++){let gy=sy+i*8+1,gw=4+((y*5+i*3)%4);c.fillStyle='#5cb85c';c.fillRect(s+TS-gw,gy,gw,3)}}
if(isW(up)&&isW(lt))c.fillStyle='#5cb85c',c.fillRect(s,sy,6,6);
if(isW(up)&&isW(rt))c.fillStyle='#5cb85c',c.fillRect(s+TS-6,sy,6,6);
if(isW(dn)&&isW(lt))c.fillStyle='#5cb85c',c.fillRect(s,sy+TS-6,6,6);
if(isW(dn)&&isW(rt))c.fillStyle='#5cb85c',c.fillRect(s+TS-6,sy+TS-6,6,6);
// 波浪过渡：草地-马路边界
if(isP(up)){let e=sprites.getWavyEdge('n',this.af);if(e)c.drawImage(e,s,sy,TS,TS)}
if(isP(dn)){let e=sprites.getWavyEdge('s',this.af);if(e)c.drawImage(e,s,sy,TS,TS)}
if(isP(lt)){let e=sprites.getWavyEdge('w',this.af);if(e)c.drawImage(e,s,sy,TS,TS)}
if(isP(rt)){let e=sprites.getWavyEdge('e',this.af);if(e)c.drawImage(e,s,sy,TS,TS)}
}
}

// ============================================================
// 地图系统
// ============================================================
class MapMgr{
constructor(){this.cur=null;this.cid=null;this.maps={};this.interior=null;this.chests={}}
load(id){
if(this.maps[id]){this.cur=this.maps[id];this.cid=id;return true}
let d=MAPS[id];if(!d)return false;
let tiles=[];for(let y=0;y<d.h;y++){tiles[y]=[];for(let x=0;x<d.w;x++)tiles[y][x]=this.gen(id,x,y)}
this.maps[id]={...d,tiles,id};this.cur=this.maps[id];this.cid=id;return true
}
loadInterior(id){
let d=INTERIORS[id];if(!d)return false;
this.interior={...d,id};return true
}
exitInterior(){
if(!this.interior)return;
let r=this.interior.ret,rx=this.interior.rx,ry=this.interior.ry;
this.interior=null;return{map:r,x:rx,y:ry}
}
getTile(x,y){
if(this.interior){
if(x<0||x>=this.interior.w||y<0||y>=this.interior.h)return CFG.T.IWALL;
return this.interior.t[y][x]
}
if(!this.cur)return CFG.T.MTN;if(x<0||x>=this.cur.w||y<0||y>=this.cur.h)return CFG.T.MTN;
return this.cur.tiles[y][x]
}
canPass(x,y){
let t=this.getTile(x,y);
if([CFG.T.TREE,CFG.T.WATER,CFG.T.WALL,CFG.T.MTN,CFG.T.LAVA,CFG.T.IWALL,CFG.T.BOOK,CFG.T.BED,CFG.T.COUNTER,CFG.T.ANVIL,CFG.T.ROOF,
CFG.T.ROOF_TL,CFG.T.ROOF_TM,CFG.T.ROOF_TR,CFG.T.ROOF_BL,CFG.T.ROOF_BM,CFG.T.ROOF_BR,
CFG.T.WALL_WIN,CFG.T.WALL_PLAIN,CFG.T.WALL_LCOR,CFG.T.WALL_RCOR,
CFG.T.DOOR_TOP,CFG.T.DOOR_BOT,CFG.T.FOUND_L,CFG.T.FOUND_M,CFG.T.FOUND_R,
CFG.T.ROCK,CFG.T.FENCE].includes(t))return false;
// NPC碰撞
for(let nid of this.getNPCs()){let nd=NPCS[nid];if(nd&&nd.x===x&&nd.y===y)return false}
// Boss碰撞（1x1范围，允许玩家接近触发战斗）
if(!this.interior&&this.cur&&this.cur.boss){
let b=this.cur.boss;
if(x===b.x&&y===b.y)return false}
return true
}
isTallGrass(x,y){return this.getTile(x,y)===CFG.T.TGRASS}
isDoor(x,y){let t=this.getTile(x,y);return t===CFG.T.DOOR||t===CFG.T.STEP}
isExit(x,y){return this.getTile(x,y)===CFG.T.EXIT}
isChest(x,y){return this.getTile(x,y)===CFG.T.CHEST}
openChest(x,y){let k=`${this.cid}_${x}_${y}`;if(this.chests[k])return null;this.chests[k]=true;
return Math.random()<0.4?{t:'g',v:50+Math.floor(Math.random()*100)}:Math.random()<0.7?{t:'i',id:'potion_s'}:{t:'i',id:'potion_m'}}
checkTp(x,y){
if(this.interior)return null;
if(!this.cur||!this.cur.tp)return null;
for(let tp of this.cur.tp)if(tp.x===x&&tp.y===y)return tp;return null
}
getNPCs(){
if(this.interior){let d=INTERIORS[this.interior.id];return d?d.npcs||[]:[]}
if(!this.cur)return[];return this.cur.npcs||[]
}
render(cx,cy){
if(this.interior){
let d=this.interior;let sx=Math.floor(cx),sy=Math.floor(cy);
// 室内：地面层
ren.pushTarget(ren.groundCtx);
for(let y=sy;y<sy+CFG.VY+2;y++)for(let x=sx;x<sx+CFG.VX+2;x++){
let t=x>=0&&x<d.w&&y>=0&&y<d.h?d.t[y][x]:CFG.T.IWALL;
if(ren.isGroundTile(t))ren.drawTile(x,y,t,cx,cy,d.w,d.h)}
// 室内：物件层
ren.pushTarget(ren.objCtx);
for(let y=sy;y<sy+CFG.VY+2;y++)for(let x=sx;x<sx+CFG.VX+2;x++){
let t=x>=0&&x<d.w&&y>=0&&y<d.h?d.t[y][x]:CFG.T.IWALL;
if(!ren.isGroundTile(t))ren.drawTile(x,y,t,cx,cy,d.w,d.h)}
ren.popTarget();ren.popTarget();
return
}
if(!this.cur)return;
let sx=Math.floor(cx),sy=Math.floor(cy);

ren.pushTarget(ren.groundCtx);
for(let y=sy;y<sy+CFG.VY+2;y++)for(let x=sx;x<sx+CFG.VX+2;x++){
let t=this.getTile(x,y);
if(ren.isGroundTile(t))ren.drawTile(x,y,t,cx,cy,this.cur.w,this.cur.h)}
// Autotile边缘过渡
for(let y=sy;y<sy+CFG.VY+2;y++)for(let x=sx;x<sx+CFG.VX+2;x++){
let t=this.getTile(x,y);
if(ren.isGroundTile(t))ren.drawAutotile(x,y,t,cx,cy,this)}
ren.popTarget();
// 通行2：物件层（按Y轴排序实现正确遮挡）
ren.pushTarget(ren.objCtx);
let objs=[];
for(let y=sy;y<sy+CFG.VY+2;y++)for(let x=sx;x<sx+CFG.VX+2;x++){
let t=this.getTile(x,y);
if(!ren.isGroundTile(t))objs.push({x,y,t})}
objs.sort((a,b)=>a.y-b.y);
for(let o of objs){
if(o.t===CFG.T.TREE)ren.drawTreeLarge(o.x,o.y,cx,cy);
else ren.drawTile(o.x,o.y,o.t,cx,cy,this.cur.w,this.cur.h)}
ren.popTarget();
}
gen(id,x,y){
let d=MAPS[id],w=d.w,h=d.h;
// 检查传送点位置（优先于边界）
if(d.tp)for(let tp of d.tp)if(tp.x===x&&tp.y===y)return CFG.T.GATE;
if(x===0||x===w-1||y===0||y===h-1){
if(id==='village'||id==='grassland'||id==='forest'||id==='swamp')return CFG.T.TREE;return CFG.T.MTN}
switch(id){
case'village':return this.gVillage(x,y);
case'grassland':return this.gGrass(x,y);
case'forest':return this.gForest(x,y);
case'volcano':return this.gVolcano(x,y);
case'castle':return this.gCastle(x,y);
case'swamp':return this.gSwamp(x,y);
case'ruins':return this.gRuins(x,y);
case'dragon':return this.gDragon(x,y);
}return CFG.T.GRASS
}
// 建筑图块生成辅助函数
bldgTile(x,y,bx,by,bw,bh,doorRx){
let rx=x-bx,ry=y-by,w=bw-1,h=bh-1;
// 屋顶行 (前2行)
if(ry===0){if(rx===0)return CFG.T.ROOF_TL;if(rx===w)return CFG.T.ROOF_TR;return CFG.T.ROOF_TM}
if(ry===1){if(rx===0)return CFG.T.ROOF_BL;if(rx===w)return CFG.T.ROOF_BR;return CFG.T.ROOF_BM}
// 阴影行 (最后1行)
if(ry===h)return CFG.T.SHADOW;
// 地基行 (倒数第2行)
if(ry===h-1){
if(rx===0)return CFG.T.FOUND_L;if(rx===w)return CFG.T.FOUND_R;
if(rx===doorRx)return CFG.T.STEP;return CFG.T.FOUND_M}
// 门上方
if(ry===h-3&&rx===doorRx)return CFG.T.DOOR_TOP;
// 门下方
if(ry===h-2&&rx===doorRx)return CFG.T.DOOR_BOT;
// 墙壁行
if(ry===2&&(rx===1||rx===3||rx===5||rx===7||rx===9)&&rx!==doorRx)return CFG.T.WALL_WIN;
return CFG.T.WALL_PLAIN
}
gVillage(x,y){
// === 主角家 (8x7, 门在rx=3) ===
if(x>=15&&x<=22&&y>=12&&y<=18)return this.bldgTile(x,y,15,12,8,7,3);
// Boss房
if(x>=24&&x<=31&&y>=12&&y<=18)return CFG.T.DEV_HOUSE;
// === 村长家 (11x9, 门在rx=5) ===
if(x>=70&&x<=80&&y>=12&&y<=20)return this.bldgTile(x,y,70,12,11,9,5);
// === 商人屋 (11x8, 门在rx=5) ===
if(x>=45&&x<=55&&y>=25&&y<=32)return this.bldgTile(x,y,45,25,11,8,5);
// === 旅馆 (11x8, 门在rx=5) ===
if(x>=70&&x<=80&&y>=55&&y<=62)return this.bldgTile(x,y,70,55,11,8,5);
// === 铁匠铺 (11x8, 门在rx=5) ===
if(x>=15&&x<=25&&y>=55&&y<=62)return this.bldgTile(x,y,15,55,11,8,5);
// 喷泉
if(x>=47&&x<=52&&y>=42&&y<=47)return CFG.T.FOUNTAIN;
// 道路 - 2格宽
if((y===39||y===40)&&x>=10&&x<=90)return CFG.T.PATH;
if((x===49||x===50)&&y>=10&&y<=78)return CFG.T.PATH;
if((y===34||y===35)&&x>=20&&x<=80)return CFG.T.PATH;
// 装饰物
if((x===15||x===85)&&(y===25||y===65))return CFG.T.FLOWER;
if((x===10&&y===10)||(x===90&&y===10)||(x===10&&y===70)||(x===90&&y===70))return CFG.T.TORCH;
if(x===49&&y===78)return CFG.T.GATE;
if((x===47||x===51)&&y===77)return CFG.T.TORCH;
if((x===45&&y===40)||(x===55&&y===40))return CFG.T.FLOWER;
// 花丛装饰
// Coromon decorations
if((x===20||x===25||x===30)&&(y===20||y===25))return CFG.T.HEDGE;
if((x===72||x===77||x===82)&&(y===15||y===20))return CFG.T.HEDGE;
if((x===48||x===52)&&y===40)return CFG.T.LANTERN;
if((x===48||x===52)&&y===35)return CFG.T.LANTERN;
if((x*11+y*19)%43<3)return CFG.T.FLOWER;
return CFG.T.GRASS
}
gGrass(x,y){
// 湖泊 - 翡翠草原中心的大湖（上移避开路径y=39/40）
let dx=x-32,dy=y-28;
if(dx*dx/(9*9)+dy*dy/(7*7)<=1)return CFG.T.WATER;
// 主路径 - 2格宽
if((y===39||y===40)&&x>=0&&x<=100)return CFG.T.PATH;
if((x===49||x===50)&&y>=0&&y<=80)return CFG.T.PATH;
// 传送点
if(x===49&&y===0)return CFG.T.PATH;
if(x===49&&y===1)return CFG.T.GATE;
if((x===47||x===51)&&y===2)return CFG.T.TORCH;
// 高草区域 - 更大范围
if(x>=15&&x<=85&&y>=15&&y<=65&&Math.random()<0.22)return CFG.T.TGRASS;
// 装饰物 - 花朵（更多）
if(Math.random()<0.06)return CFG.T.FLOWER;
// 装饰物 - 岩石
if((x*17+y*23)%47<2)return CFG.T.ROCK;
// 花丛装饰带
if((y===25||y===55)&&x>=20&&x<=80&&(x*7)%5<1)return CFG.T.FLOWER;
// 隐藏宝箱区域
if(x>=95&&y>=75)return CFG.T.ALTAR;
// 散落花朵
if((x*13+y*31)%67<3)return CFG.T.FLOWER;
return CFG.T.GRASS
}
gForest(x,y){
// 湖泊 - 幽暗森林中的小湖
let dx=x-65,dy=y-25;
if(dx*dx/(6*6)+dy*dy/(5*5)<=1)return CFG.T.WATER;
// 主路径 - 2格宽
if((y===39||y===40)&&x>=0&&x<=100)return CFG.T.PATH;
if((x===49||x===50)&&y>=0&&y<=80)return CFG.T.PATH;
// 传送点
if((x===1||x===98)&&y===40)return CFG.T.GATE;
if((x===1||x===98)&&(y===38||y===42))return CFG.T.TORCH;
// 树木 - 降低密度，路径附近2格不生成树木
let nearPath=(y>=37&&y<=42)||(x>=47&&x<=52);
if(!nearPath&&Math.random()<0.15)return CFG.T.TREE;
// 高草
if(Math.random()<0.14)return CFG.T.TGRASS;
// 装饰物 - 花朵
if(Math.random()<0.04)return CFG.T.FLOWER;
// 装饰物 - 岩石
if((x*19+y*29)%53<2)return CFG.T.ROCK;
// 花丛装饰
if((x*11+y*37)%71<2)return CFG.T.FLOWER;
return CFG.T.GRASS
}
gVolcano(x,y){
if((y===40&&x>=0&&x<=100)||(x===50&&y>=0&&y<=80))return CFG.T.PATH;
if((x===1||x===98)&&y===40)return CFG.T.GATE;
if((x===1||x===98)&&(y===38||y===42))return CFG.T.TORCH;
if(x>=30&&x<=70&&y>=10&&y<=30&&Math.random()<0.2)return CFG.T.LAVA;
if(Math.random()<0.15)return CFG.T.MTN;
if(x>=85&&y>=65)return CFG.T.ALTAR;
return CFG.T.GRASS
}
gCastle(x,y){
if((y===40&&x>=0&&x<=100)||(x===50&&y>=0&&y<=80))return CFG.T.PATH;
if(x===1&&y===40)return CFG.T.GATE;
if(x===1&&(y===38||y===42))return CFG.T.TORCH;
if((x===20||x===80)&&y>=10&&y<=70)return CFG.T.WALL;
if((x===20||x===80)&&(y===20||y===40||y===60))return CFG.T.TORCH;
if(Math.random()<0.04)return CFG.T.TORCH;
if(x>=85&&y<=10)return CFG.T.ALTAR;
return CFG.T.FLOOR
}
gSwamp(x,y){
if((y===40&&x>=0&&x<=100)||(x===50&&y>=0&&y<=80))return CFG.T.PATH;
if(Math.random()<0.3)return CFG.T.SWAMP;
return CFG.T.GRASS
}
gRuins(x,y){
if((y===40&&x>=0&&x<=100)||(x===50&&y>=0&&y<=80))return CFG.T.PATH;
if((x===30&&y===30)||(x===70&&y===50))return CFG.T.CHEST;
if(Math.random()<0.06)return CFG.T.MTN;
return CFG.T.FLOOR
}
gDragon(x,y){
if((y===40&&x>=0&&x<=100)||(x===50&&y>=0&&y<=80))return CFG.T.PATH;
if(Math.random()<0.12)return CFG.T.LAVA;
if(Math.random()<0.15)return CFG.T.MTN;
return CFG.T.GRASS
}
}

// 玩家系统
// ============================================================
class Player{
constructor(){
this.x=49;this.y=40;this.dir='down';this.moving=false;
// 平滑移动动画
this.visualX=49;this.visualY=40;
this.slideFromX=49;this.slideFromY=40;
this.slideFrames=0;this.slideMaxFrames=9;
this.name='勇者';this.lv=1;this.exp=0;this.gold=100;
this.hp=100;this.mhp=100;this.mp=50;this.mmp=50;
this.atk=10;this.def=5;this.spd=10;
this.equip={weapon:null,armor:null,acc:null};
this.skills=[{...SKILLS[0]},{...SKILLS[6]}];
this.inv=[];this.mats=[];this.status=[];this.fav={};this.curMap='village';
this.caught=[];this.achieves=[];this.kills={};this.hChests={};
this.inInterior=false;this.interiorId=null
}
move(dx,dy){
let nx=this.x+dx,ny=this.y+dy;
if(dx>0)this.dir='right';if(dx<0)this.dir='left';
if(dy>0)this.dir='down';if(dy<0)this.dir='up';
if(map.canPass(nx,ny)){
this.slideFromX=this.x;this.slideFromY=this.y;
this.x=nx;this.y=ny;this.slideFrames=0;this.moving=true;
let tp=map.checkTp(nx,ny);if(tp)this.teleport(tp.t,tp.tx,tp.ty);
return true}
this.moving=false;return false
}
teleport(id,x,y){this.curMap=id;this.x=x;this.y=y;this.visualX=x;this.visualY=y;this.slideFrames=this.slideMaxFrames;map.load(id);ui.msg(`到达了${MAPS[id].n}！`)}
enterInterior(id){this.inInterior=true;this.interiorId=id;map.loadInterior(id);this.x=Math.floor(INTERIORS[id].w/2);this.y=INTERIORS[id].h-3;this.visualX=this.x;this.visualY=this.y;this.slideFrames=this.slideMaxFrames}
exitInterior(){let r=map.exitInterior();if(r){this.inInterior=false;this.interiorId=null;this.curMap=r.map;this.x=r.x;this.y=r.y;this.visualX=r.x;this.visualY=r.y;this.slideFrames=this.slideMaxFrames;map.load(r.map)}}
gainExp(n){this.exp+=n;while(this.exp>=this.nextExp()&&this.lv<50)this.lvUp()}
nextExp(){return this.lv*50}
lvUp(){this.lv++;this.mhp+=20;this.hp=this.mhp;this.mmp+=5;this.mp=this.mmp;this.atk+=3;this.def+=2;
for(let s of SKILLS)if(s.lv===this.lv&&!this.skills.find(sk=>sk.id===s.id)){this.skills.push({...s});ui.msg(`学会了${s.name}！`)}
ui.msg(`升级！Lv.${this.lv}`)}
totalAtk(){let b=0;if(this.equip.weapon)b+=(this.equip.weapon.atk||0);
if(this.equip.acc&&this.equip.acc.atkBonus)b+=Math.floor(this.atk*this.equip.acc.atkBonus);
return Math.floor((this.atk+b)*(this.hasBuff('berserk')?1.5:1))}
totalDef(){let b=0;if(this.equip.armor)b+=(this.equip.armor.def||0);
if(this.equip.acc&&this.equip.acc.defBonus)b+=Math.floor(this.def*this.equip.acc.defBonus);
return Math.floor((this.def+b)*(this.hasBuff('shield')?1.5:1))}
hasBuff(t){return this.status.some(s=>s.type===t)}
addInv(id,n=1){let d=ITEMS[id]||MATS[id];if(!d)return;
let e=this.inv.find(i=>i.id===id);if(e)e.count+=n;else this.inv.push({id,name:d.name,type:d.type||'m',count:n})}
addMat(id,n=1){let d=MATS[id];if(!d)return;
let e=this.mats.find(i=>i.id===id);if(e)e.count+=n;else this.mats.push({id,name:d.name,count:n})}
removeInv(id,n=1){let i=this.inv.findIndex(x=>x.id===id);if(i===-1)return false;
this.inv[i].count-=n;if(this.inv[i].count<=0)this.inv.splice(i,1);return true}
hasItem(id,n=1){let i=this.inv.find(x=>x.id===id);return i&&i.count>=n}
equipItem(item){let sl=item.slot;if(this.equip[sl])this.unequip(sl);this.equip[sl]=item;this.removeInv(item.id,1);ui.msg(`装备了${item.name}！`)}
unequip(sl){if(!this.equip[sl])return;let i=this.equip[sl];this.addInv(i.id,1);this.equip[sl]=null}
rest(){this.hp=this.mhp;this.mp=this.mmp;ui.msg('休息完毕！HP/MP已恢复！')}
updateVisual(){
if(this.slideFrames<this.slideMaxFrames){
this.slideFrames++;
let t=this.slideFrames/this.slideMaxFrames;
t=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
this.visualX=this.slideFromX+(this.x-this.slideFromX)*t;
this.visualY=this.slideFromY+(this.y-this.slideFromY)*t;
}else{this.visualX=this.x;this.visualY=this.y}
}
render(cx,cy){ren.drawChar(this.visualX,this.visualY,this.dir,'player',cx,cy,this.moving)}
}

// ============================================================
// 战斗系统
// ============================================================
class Battle{
constructor(){this.on=false;this.m=null;this.turn='p';this.log=[];this.sa=0;this.ss=0;this.si=0;this.st='action';
// 动画系统
this.animT=0;this.animType='';this.shakeX=0;this.shakeY=0;this.flashT=0;
this.dispHpM=0;this.dispHpP=0;this.textTimer=0;this.fullText='';this.dispChars=0;
this.phase='intro';this.phaseT=0;this.slideX=0;
// 攻击动画系统
this.atkAnim='none';this.atkAnimT=0;this.atkAnimDur=45;this.atkSavedX=0;this.atkSavedY=0;
// 连击系统
this.combo={count:0,elem:null};this.turnCnt=0;this.lastPElem='normal'}
start(id,isBoss=false){
let d=isBoss?BOSS[id]:MONS[id];if(!d)return;
this.m=new Monster(id,d,isBoss);this.on=true;this.turn='p';this.log=[];this.st='action';this.sa=0;
this.dispHpM=this.m.hp;this.dispHpP=player.hp;
this.phase='intro';this.phaseT=0;this.slideX=400;
this.fullText=isBoss?`${this.m.name}出现了！要战斗了！`:`野生的${this.m.name}出现了！`;
this.dispChars=0;this.textTimer=0;
if(isBoss&&this.m.weak)this.fullText+=` 弱点：${this.m.weak}`;
this.combo={count:0,elem:null};this.turnCnt=0;this.lastPElem='normal'
}
getComboMult(elem){
const COMBO_MULT=[1,1.2,1.5,1.8,2.2,3];
if(this.combo.elem===elem){this.combo.count=Math.min(this.combo.count+1,COMBO_MULT.length-1)}
else{this.combo.count=0;this.combo.elem=elem}
if(this.combo.count>0)this.add(`连击 x${this.combo.count}！(${COMBO_MULT[this.combo.count]}倍)`);
return COMBO_MULT[this.combo.count]}
add(t){this.log.unshift(t);if(this.log.length>5)this.log.pop()}
act(a){
if(this.turn!=='p')return;
if(a==='atk')this.pAtk();else if(a==='skill')this.st='skill';else if(a==='item')this.st='item';
else if(a==='run')this.esc()
}
pAtk(){
if(this.m.isFinal&&!player.mats.some(m=>m.id==='genesis_k')){this.add('普通攻击无效！需要创世之钥！');this.turn='m';setTimeout(()=>this.mTurn(),1200);return}
let d=this.calc(player.totalAtk(),this.m.def);
if(this.m.isFinal)d=Math.max(1,Math.floor(d*0.3));
let cr=Math.random()<CFG.CRIT;if(cr){d=Math.floor(d*CFG.CRIT_M)}
let cm=this.getComboMult('normal');d=Math.floor(d*cm);
this.lastPElem='normal';
// 触发冲刺动画
this.atkAnim='rush';this.atkAnimT=0;this.atkDur=d;this.atkCrit=cr;
this.turn='anim'
}
useSkill(i){
if(i>=player.skills.length)return;let s=player.skills[i];
if(player.mp<s.mp){this.add('MP不足！');return}
player.mp-=s.mp;
if(s.type==='phys'||s.type==='magic'){
if(this.m.isFinal&&!player.mats.some(m=>m.id==='genesis_k')){this.add('技能无效！需要创世之钥！');this.turn='m';this.st='action';setTimeout(()=>this.mTurn(),1200);return}
let base=s.type==='phys'?player.totalAtk():Math.floor(player.totalAtk()*1.2);
let d=this.calc(base,this.m.def);let em=this.getEm(s.elem,this.m.el);d=Math.floor(d*em);
let cm=this.getComboMult(s.elem);d=Math.floor(d*cm);
this.lastPElem=s.elem;
if(this.m.weak&&s.elem===this.m.weak){d*=2;this.add('效果拔群！')}
if(s.crit&&Math.random()<s.crit){d=Math.floor(d*CFG.CRIT_M);this.add('暴击！')}
if(s.hpCost){let loss=Math.floor(player.mhp*s.hpCost);player.hp=Math.max(1,player.hp-loss)}
this.m.dmg(d);this.add(`${s.name}，${d}伤害！`);
if(s.status)this.mStatus(s.status)
}else if(s.type==='heal'){let a=Math.floor(player.mhp*s.pow);player.hp=Math.min(player.mhp,player.hp+a);this.add(`${s.name}，恢复${a}HP！`)}
else if(s.type==='buff'){player.status.push({type:s.status,dur:3});this.add(`${s.name}！`)}
if(!this.m.alive())this.win();else{this.turn='m';this.st='action';setTimeout(()=>this.mTurn(),1200)}
}
useItem(id){
let item=ITEMS[id];if(!item)return;
if(item.eff==='heal'){player.hp=Math.min(player.mhp,player.hp+item.val);this.add(`${item.name}，恢复${item.val}HP！`)}
else if(item.eff==='mp'){player.mp=Math.min(player.mmp,player.mp+item.val);this.add(`${item.name}，恢复${item.val}MP！`)}
else if(item.eff==='cure'){player.status=player.status.filter(s=>s.type!==item.val);this.add(`${item.name}！`)}
else if(item.eff==='escape'){this.add('逃跑成功！');this.end();return}
else if(item.eff==='buff_atk'){player.status.push({type:'berserk',dur:item.dur});this.add('攻击力提升！')}
else if(item.eff==='buff_def'){player.status.push({type:'shield',dur:item.dur});this.add('防御力提升！')}
player.removeInv(id,1);this.turn='m';this.st='action';setTimeout(()=>this.mTurn(),1200)
}
esc(){if(this.m.isBoss){this.add('无法逃跑！');return}
if(Math.random()<CFG.ESC){this.add('逃跑成功！');this.end()}else{this.add('逃跑失败！');this.turn='m';setTimeout(()=>this.mTurn(),1200)}}
mTurn(){
if(!this.m||!this.m.alive())return;
if(this.m.status.some(s=>s.type==='freeze'||s.type==='stun')){this.add(`${this.m.name}无法行动！`);this.m.status=this.m.status.filter(s=>s.type!=='freeze'&&s.type!=='stun');this.turn='p';return}
this.turnCnt++;
if(this.checkBehavior()){this.pStatus();if(player.hp<=0)this.lose();else{this.turn='p';this.st='action'};return}
let d=this.calc(this.m.atk,player.totalDef());
if(player.hasBuff('shield'))d=Math.floor(d*0.5);
if(this.m.status.some(s=>s.type==='berserk'))d=Math.floor(d*1.5);
player.hp=Math.max(0,player.hp-d);this.add(`${this.m.name}攻击，${d}伤害！`);

}
checkBehavior(){
if(!this.m||!this.m.behavior)return false;
let bh=this.m.behavior,hpR=this.m.hp/this.m.mhp;
// 狼：HP<50%召唤同伴
if(bh==='wolf'&&hpR<0.5&&!this.m._summoned){
this.m._summoned=true;let heal=Math.floor(this.m.mhp*0.2);
this.m.hp=Math.min(this.m.mhp,this.m.hp+heal);
this.add(`${this.m.name}嚎叫召唤同伴！恢复${heal}HP！`);return true}
// 蝙蝠：HP<30%逃跑
if(bh==='bat'&&hpR<0.3&&!this.m._fled){
this.m._fled=true;this.add(`${this.m.name}惊慌逃跑！`);
this.m.hp=0;this.win();return true}
// 树精：每3回合防御
if(bh==='treant'&&this.turnCnt%3===0){
this.m.def=Math.floor(this.m.def*1.5);this.m.status.push({type:'shield',dur:1});
this.add(`${this.m.name}进入防御姿态！DEF提升！`);return true}
// 火蜥蜴：HP<20%暴走
if(bh==='fire_salamander'&&hpR<0.2&&!this.m._berserked){
this.m._berserked=true;this.m.atk=Math.floor(this.m.atk*2);
this.m.status.push({type:'berserk',dur:99});
this.add(`${this.m.name}进入暴走状态！ATK翻倍！`);return true}
// 龙裔：被克制攻击后适应
if(bh==='dragon_kin'&&this.lastPElem===this.m.weak&&!this.m.adapted){
this.m.adapted=true;this.m.def=Math.floor(this.m.def*1.3);
this.add(`${this.m.name}适应了${this._elemName(this.lastPElem)}属性！DEF提升！`);return true}
return false}
calc(a,d){return Math.max(1,Math.floor(a*(1+Math.random()*0.1)-d*0.5))}
getEm(a,d){if(!a||!d||a==='normal')return 1;let c=CFG.ELEM[a];if(!c)return 1;if(c.strong===d)return 1.5;if(c.weak===d)return 0.5;return 1}
mStatus(t){let s={poison:{n:'中毒',dur:3},burn:{n:'灼烧',dur:3},freeze:{n:'冰冻',dur:1},stun:{n:'眩晕',dur:1}}[t];if(s){this.m.status.push({type:t,dur:s.dur});this.add(`${this.m.name}${s.n}！`)}}
pStatus(){player.status=player.status.filter(e=>{
if(e.type==='poison'){let d=Math.floor(player.mhp*0.05);player.hp=Math.max(0,player.hp-d);this.add(`中毒！${d}伤害`)}
if(e.type==='burn'){let d=Math.floor(player.mhp*0.03);player.hp=Math.max(0,player.hp-d);this.add(`灼烧！${d}伤害`)}

class Save{
key='pxrpg_v3'
save(){
let d={p:{x:player.x,y:player.y,dir:player.dir,name:player.name,lv:player.lv,exp:player.exp,gold:player.gold,
hp:player.hp,mhp:player.mhp,mp:player.mp,mmp:player.mmp,atk:player.atk,def:player.def,
curMap:player.curMap,inv:player.inv,mats:player.mats,equip:player.equip,skills:player.skills,
fav:player.fav,caught:player.caught,achieves:player.achieves,kills:player.kills,hChests:player.hChests||{},
inInterior:player.inInterior,interiorId:player.interiorId},
chests:map.chests,ts:Date.now()};
try{localStorage.setItem(this.key,JSON.stringify(d));ui.msg('已保存！');return true}catch(e){ui.msg('保存失败！');return false}
}
load(){
try{let r=localStorage.getItem(this.key);if(!r){ui.msg('没有存档！');return false}
let d=JSON.parse(r),p=d.p;
player.x=p.x;player.y=p.y;player.dir=p.dir;player.name=p.name;player.lv=p.lv;player.exp=p.exp;player.gold=p.gold;
player.hp=p.hp;player.mhp=p.mhp;player.mp=p.mp||50;player.mmp=p.mmp||50;player.atk=p.atk;player.def=p.def;
player.curMap=p.curMap;player.inv=p.inv||[];player.mats=p.mats||[];player.equip=p.equip;player.skills=p.skills;
player.fav=p.fav||{};player.caught=p.caught||[];player.achieves=p.achieves||[];player.kills=p.kills||{};player.hChests=p.hChests||{};
player.inInterior=p.inInterior||false;player.interiorId=p.interiorId||null;
map.chests=d.chests||{};
if(player.inInterior&&player.interiorId){map.loadInterior(player.interiorId)}else{map.load(player.curMap)}
ui.msg('已读取！');return true}catch(e){ui.msg('读取失败！');return false}
}
has(){return localStorage.getItem(this.key)!==null}
}

class Audio{
constructor(){this.ctx=null;this.on=true;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){this.on=false}}
play(f,d,t='sine',v=0.1){if(!this.on||!this.ctx)return;try{let o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(this.ctx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+d);o.stop(this.ctx.currentTime+d)}catch(e){}}
step(){this.play(200+Math.random()*80,0.04,'square',0.02)}
atk(){this.play(150,0.1,'sawtooth',0.12)}
hit(){this.play(80,0.12,'square',0.1)}
lv(){this.play(523,0.12,'sine',0.12);setTimeout(()=>this.play(659,0.12,'sine',0.12),120);setTimeout(()=>this.play(784,0.2,'sine',0.12),240)}
item(){this.play(880,0.08,'sine',0.08);setTimeout(()=>this.play(1100,0.12,'sine',0.08),80)}
boss(){this.play(100,0.25,'sawtooth',0.15);setTimeout(()=>this.play(80,0.25,'sawtooth',0.15),150)}
talk(){this.play(400+Math.random()*150,0.025,'square',0.03)}
heal(){this.play(440,0.08,'sine',0.08);setTimeout(()=>this.play(550,0.12,'sine',0.08),80)}
}

// ============================================================
// 游戏主循环
// ============================================================
const input=new Input();
const ren=new Renderer('gameCanvas');
const map=new MapMgr();
const player=new Player();
const battle=new Battle();
const ui=new UI();
const save=new Save();
const audio=new Audio();

let state='playing';let encCd=0;let camX=0,camY=0;let stepCnt=0;let doorCd=0;

function init(){
map.load('village');
if(save.has())save.load();
input.onKey=k=>handleKey(k);
loop()
}

function loop(){update();render();requestAnimationFrame(loop)}

function update(){
ren.update();ui.update();ui.updateBar();
if(encCd>0)encCd--;
if(doorCd>0)doorCd--;
if(state==='playing')updatePlay();
player.updateVisual();
updateCam()
}

function updatePlay(){
let d=input.dir();
if(d&&!ui.dlg&&!ui.menu&&!ui.showInv&&!ui.showEq&&!ui.showMap){
let dx=0,dy=0;
if(d==='up')dy=-1;if(d==='down')dy=1;if(d==='left')dx=-1;if(d==='right')dx=1;
let moved=player.move(dx,dy);
if(moved){stepCnt++;if(stepCnt%3===0)audio.step();
checkEnc();checkDoor();checkChest();
if(player.mp<player.mmp&&Math.random()<0.01)player.mp++;
if(Math.random()<0.003)randEvent()}}
if(Math.random()<0.00003){let m=['远处传来奇怪的声音...','地面微微震动...','你听到键盘敲击声...等等？','一阵风吹过...'];ui.msg(m[Math.floor(Math.random()*m.length)])}
}

function updateCam(){
if(player.inInterior&&map.interior){
let tx=player.visualX-CFG.VX/2,ty=player.visualY-CFG.VY/2;
camX+=(tx-camX)*0.15;camY+=(ty-camY)*0.15;
camX=Math.max(0,Math.min(camX,map.interior.w-CFG.VX));
camY=Math.max(0,Math.min(camY,map.interior.h-CFG.VY));return
}
let tx=player.visualX-CFG.VX/2,ty=player.visualY-CFG.VY/2;
camX+=(tx-camX)*0.1;camY+=(ty-camY)*0.1;
camX=Math.max(0,Math.min(camX,CFG.MW-CFG.VX));camY=Math.max(0,Math.min(camY,CFG.MH-CFG.VY))
}

function checkEnc(){
if(encCd>0||player.inInterior)return;
// Boss碰撞检测（相邻格子自动触发）
if(map.cur&&map.cur.boss){
let b=map.cur.boss,dist=Math.abs(player.x-b.x)+Math.abs(player.y-b.y);
if(dist<=1){battle.start(b.id,true);state='battle';encCd=120;audio.boss();return}}
// 只在高草丛遇敌
if(!map.isTallGrass(player.x,player.y))return;
if(Math.random()<0.08){let ma=MAPS[player.curMap]?.ma;if(!ma||!ma.length)return;
let m=ma[0].m;let mid=m[Math.floor(Math.random()*m.length)];
battle.start(mid,false);state='battle';encCd=120;audio.atk()}
}

function checkDoor(){
if(doorCd>0)return;
if(player.inInterior){
if(map.isExit(player.x,player.y)){player.exitInterior();audio.item();doorCd=30}
return
}
if(map.isDoor(player.x,player.y)){
let key=`${player.curMap}_${player.x}_${player.y}`;
let interiorId=DOOR_MAP[key];
if(interiorId){player.enterInterior(interiorId);audio.item();doorCd=30}
}
}

function checkChest(){
if(map.isChest(player.x,player.y)){
let r=map.openChest(player.x,player.y);
if(r){if(r.t==='g'){player.gold+=r.v;ui.msg(`宝箱！${r.v}金币！`)}else{player.addInv(r.id,1);ui.msg(`宝箱！${ITEMS[r.id].name}！`)}audio.item()}}
}

function randEvent(){
let r=Math.random();
if(r<0.2){let g=Math.floor(Math.random()*40)+10;player.gold+=g;ui.msg(`捡到宝箱！${g}金币！`);audio.item()}
else if(r<0.35){ui.msg('踩到陷阱！-10HP！');player.hp=Math.max(1,player.hp-10);audio.hit()}
else if(r<0.5){ui.msg('发现四叶草！HP+15！');player.hp=Math.min(player.mhp,player.hp+15);audio.heal()}
else if(r<0.7){ui.msg('天气变了！');ren.wt=0}
else{let m=['地上有行字："debug_mode=on"','NPC在自言自语："我是谁？"','你踩到按钮，什么都没发生','你突然想吃泡面','远处有传送门...走近看是光影'];ui.msg(m[Math.floor(Math.random()*m.length)])}
}

function handleKey(k){
if(state==='battle'){battleKey(k);return}
if(ui.dlg){if(k===' '||k==='Escape')ui.dlgClose();return}
if(ui.menu){menuKey(k);return}
if(ui.showInv){if(k==='Escape'||k==='i')ui.showInv=false;return}
if(ui.showEq){if(k==='Escape')ui.showEq=false;return}
if(ui.showMap){if(k==='Escape'||k==='m')ui.showMap=false;return}
switch(k){
case' ':interact();break;
case'Escape':ui.menuShow();break;
case'i':ui.showInv=true;audio.item();break;
case'm':ui.showMap=true;break;
case's':save.save();break
}
}

function menuKey(k){
switch(k){
case'ArrowUp':ui.menu.sel=(ui.menu.sel-1+ui.menu.items.length)%ui.menu.items.length;break;
case'ArrowDown':ui.menu.sel=(ui.menu.sel+1)%ui.menu.items.length;break;
case' ':
let s=ui.menu.items[ui.menu.sel];
if(s==='背包'){ui.menuClose();ui.showInv=true}else if(s==='装备'){ui.menuClose();ui.showEq=true}
else if(s==='存档'){save.save();ui.menuClose()}else if(s==='读档'){save.load();ui.menuClose()}else ui.menuClose();break;
case'Escape':ui.menuClose();break
}
}

function battleKey(k){
if(!battle.on){state='playing';return}
if(battle.turn==='anim')return; // 动画期间不接受输入
if(battle.st==='action'){
switch(k){
case'ArrowLeft':battle.sa=(battle.sa-1+4)%4;break;
case'ArrowRight':battle.sa=(battle.sa+1)%4;break;
case' ':let a=['atk','skill','item','run'];battle.act(a[battle.sa]);audio.atk();break}
}else if(battle.st==='skill'){
switch(k){
case'ArrowLeft':battle.ss=(battle.ss-1+player.skills.length)%player.skills.length;break;
case'ArrowRight':battle.ss=(battle.ss+1)%player.skills.length;break;
case' ':battle.useSkill(battle.ss);audio.atk();break;
case'Escape':battle.st='action';break}
}else if(battle.st==='item'){
let items=player.inv.filter(i=>i.type==='c');
switch(k){
case'ArrowLeft':battle.si=(battle.si-1+Math.max(1,items.length))%Math.max(1,items.length);break;
case'ArrowRight':battle.si=(battle.si+1)%Math.max(1,items.length);break;
case' ':if(items.length>0)battle.useItem(items[battle.si].id);break;
case'Escape':battle.st='action';break}
}
if(!battle.on){state='playing';audio.lv()}
}

function interact(){
let cx=player.x,cy=player.y;
if(player.dir==='up')cy--;if(player.dir==='down')cy++;if(player.dir==='left')cx--;if(player.dir==='right')cx++;
// NPC
for(let nid of map.getNPCs()){
let nd=NPCS[nid];if(!nd)continue;
if(nd.x===cx&&nd.y===cy){
if(!player.fav[nid])player.fav[nid]=0;player.fav[nid]++;
let dlgs=nd.d;if(player.fav[nid]>=5&&nd.fd)dlgs=nd.fd;
ui.dlgShow(nd.n,dlgs[Math.floor(Math.random()*dlgs.length)]);audio.talk();
nd.dir=player.x>nd.x?'right':player.x<nd.x?'left':player.y>nd.y?'down':'up';
if(player.fav[nid]===5){
if(nid==='chief'){player.addInv('potion_m',3);ui.msg('村长给了3瓶中药水！')}
if(nid==='merchant'){player.addInv('atk_pot',2);ui.msg('商人给了2瓶攻击药水！')}
if(nid==='blacksmith'){player.addInv('i_sword',1);ui.msg('铁匠送了铁剑！')}
if(nid==='wander_merchant'){player.addInv('ball',1);ui.msg('流浪商人送了精灵球！')}
if(nid==='hunter'){player.addInv('escape',3);ui.msg('猎人给了3张逃跑卷轴！')}
}return}}
// Boss
if(!player.inInterior&&map.cur&&map.cur.boss){
let b=map.cur.boss;if(b.x===cx&&b.y===cy){battle.start(b.id,true);state='battle';audio.boss();return}}
// 旅馆休息
if(player.curMap==='village'&&!player.inInterior&&cx>=70&&cx<=80&&cy>=55&&cy<=62){player.rest();audio.heal();return}
// 喷泉
if(map.getTile(cx,cy)===CFG.T.FOUNTAIN){player.hp=Math.min(player.mhp,player.hp+30);player.mp=Math.min(player.mmp,player.mp+15);ui.dlgShow('喷泉','清澈的泉水...HP/MP小幅恢复！');audio.heal();return}
// Boss房
if(map.getTile(cx,cy)===CFG.T.DEV_HOUSE){
let bd=['boar_t','wolf_kp','dragon_sc','demon_h','swamp_h','ancient_c','ldragon_s'];
let has=bd.every(d=>player.mats.some(m=>m.id===d));
if(has){if(!player.mats.some(m=>m.id==='genesis_k')){player.addMat('genesis_k',1);ui.msg('获得创世之钥！')}
ui.dlgShow('???','"你终于来了...这个世界都是我创造的。"');setTimeout(()=>{battle.start('dev',true);state='battle';audio.boss()},2000)}
else{let miss=bd.filter(d=>!player.mats.some(m=>m.id===d));ui.dlgShow('游戏工作室',`门被封印了...还缺${miss.length}个Boss掉落物。`)}
return}
// 路牌
if(map.getTile(cx,cy)===CFG.T.SIGN){ui.dlgShow('路牌','小心草丛里的怪物！按I打开背包。');return}
// 隐藏入口（优先于祭坛检查）
if(player.curMap==='grassland'&&cx>=95&&cy>=75){player.teleport('swamp',50,70);ui.msg('隐藏入口！到达迷雾沼泽！');return}
if(player.curMap==='volcano'&&cx>=85&&cy>=65){player.teleport('ruins',5,40);ui.msg('矿洞密道！到达远古遗迹！');return}
if(player.curMap==='castle'&&cx>=85&&cy<=10){player.teleport('dragon',5,40);ui.msg('王座密道！到达龙之巢穴！');return}
// 祭坛
if(map.getTile(cx,cy)===CFG.T.ALTAR){player.hp=Math.min(player.mhp,player.hp+80);player.mp=Math.min(player.mmp,player.mp+40);ui.dlgShow('神秘祭坛','远古力量...HP/MP大幅恢复！');audio.heal();return}
// 隐藏宝箱
if(checkHiddenChest(cx,cy))return
}

function checkHiddenChest(x,y){
if(player.inInterior)return false;
for(let hc of HIDDEN_CHESTS){
if(hc.map!==player.curMap||hc.x!==x||hc.y!==y)continue;
if(player.hChests&&player.hChests[hc.id])continue;
// 条件检查
if(hc.cond==='night'&&ren.phase()!=='night'){ui.msg('似乎有什么东西...夜晚再来看看。');return true}
if(hc.cond==='boss_defeated'){let bd=['boar_t','wolf_kp','dragon_sc','demon_h','swamp_h','ancient_c','ldragon_s'];if(!bd.every(d=>player.mats.some(m=>m.id===d))){ui.msg('宝箱被强大的封印保护着...');return true}}
if(hc.cond==='has_ancient_c'&&!player.mats.some(m=>m.id==='ancient_c')){ui.msg('需要远古核心才能打开...');return true}
// 开启宝箱
if(!player.hChests)player.hChests={};player.hChests[hc.id]=true;
if(hc.reward.t==='g'){player.gold+=hc.reward.v;ui.msg(`${hc.desc}！${hc.reward.v}金币！`)}
else{player.addInv(hc.reward.id,1);let it=ITEMS[hc.reward.id];ui.msg(`${hc.desc}！${it?it.name:hc.reward.id}！`)}
audio.item();return true}return false
}

function drawMiniMap(){
let c=ren.ctx,mw=140,mh=100,mx=8,my=8;
c.fillStyle='rgba(0,0,0,0.6)';c.fillRect(mx,my,mw,mh);
c.strokeStyle='#aaa';c.lineWidth=1;c.strokeRect(mx,my,mw,mh);
if(!map.cur&&!map.interior)return;
let mapW=map.interior?map.interior.w:(map.cur?map.cur.w:100);
let mapH=map.interior?map.interior.h:(map.cur?map.cur.h:80);
let sc=Math.min(mw/mapW,mh/mapH);
let ox=mx+(mw-mapW*sc)/2,oy=my+(mh-mapH*sc)/2;
for(let y=0;y<mapH;y+=3)for(let x=0;x<mapW;x+=3){
let t=map.getTile(x,y),cl;
switch(t){
case 0:case 6:case 7:cl='#4a7c59';break;
case 1:cl='#2d5a27';break;
case 2:cl='#3498db';break;
case 3:case 8:cl='#95a5a6';break;
case 4:case 5:cl='#8b4513';break;
case 10:cl='#696969';break;
case 11:cl='#ff4500';break;
case 12:cl='#556b2f';break;
case 13:cl='#f1c40f';break;
case 14:cl='#ff8c00';break;
case 15:cl='#a08060';break;
case 18:cl='#9b59b6';break;
case 19:cl='#5dade2';break;
case 20:cl='#c0392b';break;
case 21:cl='#d4a574';break;
case 22:cl='#8b6914';break;
case 23:case 29:cl='#f1c40f';break;
case 30:case 31:case 32:cl='#c0392b';break;
case 33:case 34:case 35:cl='#a93226';break;
case 36:case 37:case 38:case 39:cl='#b8860b';break;
case 40:case 41:cl='#6b3a1a';break;
case 42:case 43:case 44:cl='#808080';break;
case 45:cl='#a0a0a0';break;
case 46:cl='#2c2c2c';break;
case 50:cl='#808080';break;
case 51:cl='#A07848';break;
default:cl='#4a7c59'}
c.fillStyle=cl;c.fillRect(ox+x*sc,oy+y*sc,Math.max(2,sc*3),Math.max(2,sc*3))}
for(let nid of map.getNPCs()){let nd=NPCS[nid];if(nd){c.fillStyle='#f1c40f';
c.fillRect(ox+nd.x*sc-1,oy+nd.y*sc-1,3,3)}}
if(!map.interior&&map.cur&&map.cur.boss){let b=map.cur.boss;c.fillStyle='#e74c3c';
c.fillRect(ox+b.x*sc-2,oy+b.y*sc-2,4,4)}
c.fillStyle=ren.af%20<10?'#fff':'#ff0';
c.fillRect(ox+player.x*sc-2,oy+player.y*sc-2,4,4);
c.fillStyle='#fff';c.font='10px monospace';c.textAlign='center';
let mn=player.inInterior?(INTERIORS[player.interiorId]?.n||'室内'):(MAPS[player.curMap]?.n||'');
c.fillText(mn,mx+mw/2,my+mh+12)}

function render(){
ren.clear();
if(state==='battle'){battle.render();return}
ren.clearLayers();
// 地图双层渲染（MapMgr内部已处理地面层+物件层）
map.render(camX,camY);
// NPC和Boss绘制到物件层
ren.pushTarget(ren.objCtx);
for(let nid of map.getNPCs()){let nd=NPCS[nid];if(!nd)continue;
ren.drawChar(nd.x,nd.y,nd.dir||'down','npc',camX,camY,false);
let sx=(nd.x-camX)*CFG.TS,sy=(nd.y-camY)*CFG.TS;
if(sx>-64&&sx<1344&&sy>-64&&sy<832){
ren.ctx.fillStyle='#fff';ren.ctx.font='10px monospace';ren.ctx.textAlign='center';ren.ctx.fillText(nd.n,sx+32,sy-4);
let fv=player.fav[nid]||0;if(fv>0){ren.ctx.fillStyle='#ff69b4';ren.ctx.font='8px monospace';ren.ctx.fillText('♥'.repeat(Math.min(fv,5)),sx+32,sy-14)}}}
// Boss - 像素精灵
if(!player.inInterior&&map.cur&&map.cur.boss){
let b=map.cur.boss,bo=BOSS[b.id];
if(bo){let sx=(b.x-camX)*CFG.TS,sy=(b.y-camY)*CFG.TS;
if(sx>-64&&sx<1344&&sy>-64&&sy<832){
let bossFrame=ren.af%20<10?0:1;
let bossSpr=sprites.boss[b.id+'_'+bossFrame];
if(bossSpr){
ren.ctx.drawImage(bossSpr,sx-32,sy-32,128,128)
}else{
ren.ctx.font='36px serif';ren.ctx.textAlign='center';ren.ctx.fillText(bo.e,sx+32,sy+42)
}
ren.ctx.fillStyle='#ff0';ren.ctx.font='11px monospace';ren.ctx.textAlign='center';ren.ctx.fillText(bo.n,sx+64,sy-4);
if(bo.weak){ren.ctx.fillStyle='#f1c40f';ren.ctx.font='9px monospace';ren.ctx.fillText(`弱点:${bo.weak}`,sx+64,sy-14)}}}}
player.render(camX,camY);
ren.popTarget();
// 合成双层到主画布
ren.composite();
ren.dayNight();ren.drawWeather();
// 小地图 - 左上角常驻
drawMiniMap();
ui.render()
}

init();
</script>
